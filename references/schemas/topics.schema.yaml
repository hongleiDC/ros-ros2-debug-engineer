$schema: https://json-schema.org/draft/2020-12/schema
$id: topics.schema.yaml
type: object
required: [schema_version, status, topics]
properties:
  schema_version:
    const: 1
  status:
    enum: [candidate, measured, verified, deprecated]
  topics:
    type: object
    additionalProperties:
      type: object
      required: [message_type, direction, status]
      properties:
        message_type:
          type: string
          minLength: 1
        direction:
          enum: [publish, subscribe, both, observed]
        status:
          enum: [candidate, measured, verified, deprecated]
        frame_field:
          type: [string, 'null']
        authoritative_time:
          type: [string, 'null']
        qos:
          type: object
        units:
          type: object
        evidence:
          type: array
          items:
            type: object
      additionalProperties: true
additionalProperties: true
