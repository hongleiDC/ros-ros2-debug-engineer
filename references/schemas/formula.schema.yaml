$schema: https://json-schema.org/draft/2020-12/schema
$id: formula.schema.yaml
type: object
required:
  - schema_version
  - formula_id
  - name
  - version
  - status
  - domain
  - purpose
  - expression_latex
  - goal_alignment
  - assumptions
  - conventions
  - symbols
  - derivation
  - code_requirements
  - tests
  - provenance
properties:
  schema_version: {const: 1}
  formula_id: {type: string, pattern: '^FORM-[0-9]{4,}$'}
  name: {type: string, minLength: 1}
  version: {type: string, minLength: 1}
  status: {enum: [draft, candidate, measured, verified, deprecated]}
  domain: {type: string, minLength: 1}
  purpose: {type: string, minLength: 1}
  expression_latex: {type: string, minLength: 1}
  goal_alignment:
    type: object
    required: [goal_id, criterion_ids]
    properties:
      goal_id: {type: [string, 'null'], pattern: '^GOAL-[0-9]{4,}$'}
      criterion_ids:
        type: array
        items: {type: string, pattern: '^SC-[0-9]+$'}
        uniqueItems: true
    additionalProperties: false
  assumptions:
    type: array
    items:
      type: object
      required: [assumption_id, statement, status, evidence]
      properties:
        assumption_id: {type: string, pattern: '^ASM-[0-9]+$'}
        statement: {type: string, minLength: 1}
        status: {enum: [unknown, candidate, verified, rejected]}
        evidence:
          type: array
          items: {type: string}
      additionalProperties: false
  conventions:
    type: object
    required: [frame_convention, transform_direction, multiplication_order, time_basis, index_order]
    properties:
      frame_convention: {type: string, minLength: 1}
      transform_direction: {type: string, minLength: 1}
      multiplication_order: {type: string, minLength: 1}
      time_basis: {type: string, minLength: 1}
      index_order: {type: string, minLength: 1}
    additionalProperties: false
  symbols:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - symbol_id
        - latex
        - meaning
        - role
        - dimension
        - canonical_unit
        - frame
        - direction
        - time_basis
        - shape
        - valid_range
        - required_in_code
      properties:
        symbol_id: {type: string, pattern: '^SYM-[0-9]+$'}
        latex: {type: string, minLength: 1}
        meaning: {type: string, minLength: 1}
        role: {enum: [input, output, state, parameter, intermediate, noise, constant]}
        dimension: {type: string, minLength: 1}
        canonical_unit: {type: string, minLength: 1}
        frame: {type: string, minLength: 1}
        direction: {type: string, minLength: 1}
        time_basis: {type: string, minLength: 1}
        shape: {type: string, minLength: 1}
        valid_range: {type: string, minLength: 1}
        required_in_code: {type: boolean}
      additionalProperties: false
  derivation:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - step_id
        - equation_latex
        - operation
        - justification
        - input_symbol_ids
        - output_symbol_ids
        - assumption_refs
      properties:
        step_id: {type: string, pattern: '^DER-[0-9]+$'}
        equation_latex: {type: string, minLength: 1}
        operation: {type: string, minLength: 1}
        justification: {type: string, minLength: 1}
        input_symbol_ids:
          type: array
          items: {type: string, pattern: '^SYM-[0-9]+$'}
        output_symbol_ids:
          type: array
          items: {type: string, pattern: '^SYM-[0-9]+$'}
        assumption_refs:
          type: array
          items: {type: string, pattern: '^ASM-[0-9]+$'}
      additionalProperties: false
  code_requirements:
    type: object
    required: [mapping_required, invariants, forbidden_aliases]
    properties:
      mapping_required: {type: boolean}
      invariants:
        type: array
        items: {type: string}
      forbidden_aliases:
        type: array
        items: {type: string}
    additionalProperties: false
  tests:
    type: array
    items: {type: string}
  provenance:
    type: object
    required: [source, repository_commit, evidence]
    properties:
      source: {type: string, minLength: 1}
      repository_commit: {type: string, minLength: 1}
      evidence:
        type: array
        items: {type: string}
    additionalProperties: true
additionalProperties: false
