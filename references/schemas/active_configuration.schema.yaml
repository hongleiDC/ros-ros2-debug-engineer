$schema: https://json-schema.org/draft/2020-12/schema
$id: active_configuration.schema.yaml
type: object
required: [schema_version, status, configuration, verification]
properties:
  schema_version:
    const: 1
  status:
    enum: [candidate, measured, verified, deprecated]
  configuration:
    type: object
  active_devices:
    type: array
    items:
      type: string
    uniqueItems: true
  active_calibrations:
    type: array
    items:
      type: string
    uniqueItems: true
  verification:
    type: object
    required: [evidence]
    properties:
      evidence:
        type: array
        items:
          type: object
    additionalProperties: true
additionalProperties: true
