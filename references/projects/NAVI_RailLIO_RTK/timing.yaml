status: verified
rules:
  rtk:
    authoritative_measurement_time: packet_gps_week_and_seconds_of_week
    ros_topic_arrival_time_is_measurement_time: false
    callback_now_allowed_for_fusion: false
    arrival_time_use: latency_diagnostics_only
    note: user-confirmed project rule; preserve original packet time through bridge and fusion
  lidar:
    frame_stamp_semantics:
      value: unknown
      status: candidate
    point_time:
      accepted_fields: [time, offset_time]
      expected_semantics: relative_to_frame_reference
      unit: inspect_and_record_per_driver
    bag_time_allowed_for_deskew: false
  imu:
    header_stamp_source:
      value: driver_provided
      status: candidate
  correction:
    lidar_to_imu_offset_sign: t_lidar_corrected = t_lidar_raw + offset_lidar_to_imu
    delay_time_is_time_offset: false
validation_requirements:
  - compare packet measurement time, header stamp, bag record time, and callback time
  - report count, median, p95, max, and drift trend
  - verify all fields in an atomic rtk measurement refer to the same epoch
